<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Assistant · AMHANi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --accent:    #6366f1;
      --accent-lo: #1e1f4a;
      --green:     #238636;
      --text:      #e6edf3;
      --text-dim:  #7d8590;
      --user-bg:   #1a1f4a;
      --user-border: #3b3f8f;
      --bot-bg:    #1c2128;
      --error-bg:  #2a0e0e;
      --error-bd:  #6b1a1a;
      --error-tx:  #fca5a5;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout shell ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .hd-text { flex: 1; min-width: 0; }
    .hd-text h1 { font-size: 15px; font-weight: 600; }
    .hd-text p  { font-size: 12px; color: var(--text-dim); }

    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s, box-shadow .3s;
    }

    #dot.on {
      background: #3fb950;
      box-shadow: 0 0 8px #3fb95066;
    }

    /* ── Config bar ───────────────────────────────────────────── */
    #cfg {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: max-height .3s, opacity .3s, padding .3s;
      overflow: hidden;
    }

    #cfg.hidden {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
      pointer-events: none;
    }

    #cfg label {
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    #webhook-url {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 11px;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      min-width: 0;
    }

    #webhook-url:focus { border-color: var(--accent); }
    #webhook-url::placeholder { color: var(--text-dim); }

    #connect-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    #connect-btn:hover { opacity: .85; }

    /* ── Messages ─────────────────────────────────────────────── */
    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #msgs::-webkit-scrollbar { width: 4px; }
    #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome state */
    #welcome {
      margin: auto;
      text-align: center;
      padding: 40px 24px;
      color: var(--text-dim);
      max-width: 320px;
    }

    #welcome .icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    #welcome h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    #welcome p {
      font-size: 13px;
      line-height: 1.6;
    }

    /* Message row */
    .row {
      display: flex;
      gap: 10px;
      animation: pop .18s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row.user { flex-direction: row-reverse; align-self: flex-end; max-width: 80%; }
    .row.bot  { align-self: flex-start;      max-width: 85%; }

    .av {
      width: 28px; height: 28px;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .row.user .av { background: var(--accent-lo); color: #a5b4fc; }
    .row.bot  .av { background: #1a2c1a;           color: #3fb950; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: var(--radius) 3px var(--radius) var(--radius);
      color: #c7d2fe;
    }

    .row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 3px var(--radius) var(--radius) var(--radius);
      color: var(--text);
    }

    .row.err .bubble {
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      color: var(--error-tx);
    }

    /* Typing dots */
    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 2px;
    }

    .dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: blink 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 80%, 100% { transform: scale(.7); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1; }
    }

    /* ── Input area ───────────────────────────────────────────── */
    #input-area {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 140px;
      overflow-y: auto;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-dim); }
    #msg-input:disabled { opacity: .5; cursor: not-allowed; }

    #send {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    #send:hover:not(:disabled) { opacity: .85; }

    #send:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    #send svg { width: 18px; height: 18px; fill: #fff; }
    #send:disabled svg { fill: var(--text-dim); }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 5px 16px 8px;
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    footer span { color: var(--accent); }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">A</div>
    <div class="hd-text">
      <h1>Study Assistant</h1>
      <p>AMHANi Enterprise · RAG-powered</p>
    </div>
    <div id="status">
      <div id="dot"></div>
      <span id="status-label">Disconnected</span>
    </div>
  </header>

  <!-- Webhook config -->
  <div id="cfg">
    <label>URL</label>
    <input type="url" id="webhook-url"
           placeholder="Paste your n8n webhook URL..." />
    <button id="connect-btn" onclick="connect()">Connect</button>
  </div>

  <!-- Messages -->
  <div id="msgs">
    <div id="welcome">
      <span class="icon">📚</span>
      <h2>Study Assistant</h2>
      <p>Paste your n8n webhook URL above and click <strong>Connect</strong>.<br/>
         Then ask questions from your uploaded course document.</p>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <textarea id="msg-input" rows="1" disabled
      placeholder="Ask a question from your course material..."></textarea>
    <button id="send" disabled onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <footer>
    <span>AMHANi</span> · Study Assistant RAG ·
    Built with n8n + Groq + Qdrant
  </footer>

</div>

<script>
// ── State ──────────────────────────────────────────────────────
let webhook   = localStorage.getItem('sa_webhook') || '';
let sessionId = sessionStorage.getItem('sa_sid')
                || crypto.randomUUID();
sessionStorage.setItem('sa_sid', sessionId);

let connected = false;
let busy      = false;

// ── Elements ───────────────────────────────────────────────────
const msgsEl    = document.getElementById('msgs');
const inputEl   = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send');
const cfgEl     = document.getElementById('cfg');
const urlInput  = document.getElementById('webhook-url');
const dotEl     = document.getElementById('dot');
const labelEl   = document.getElementById('status-label');

// ── Init ───────────────────────────────────────────────────────
if (webhook) {
  urlInput.value = webhook;
  setConnected(true);
}

// ── Connect ────────────────────────────────────────────────────
function connect() {
  const url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }
  webhook = url;
  localStorage.setItem('sa_webhook', url);
  setConnected(true);
}

function setConnected(on) {
  connected = on;
  dotEl.className   = on ? 'on' : '';
  labelEl.textContent = on ? 'Connected' : 'Disconnected';
  inputEl.disabled  = !on;
  sendBtn.disabled  = !on;

  if (on) {
    cfgEl.classList.add('hidden');
    removeWelcome();
    addBot('Connected! Ask me anything from your uploaded course document. ' +
           '\n\n💡 Tip: Ask "What exam questions might come from this material?" ' +
           'to test your knowledge.');
  }
}

function disconnect() {
  connected = false;
  cfgEl.classList.remove('hidden');
  setConnected(false);
}

// ── Welcome / session ──────────────────────────────────────────
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

// ── Auto-resize textarea ───────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// ── Send message ───────────────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text || !connected || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  removeWelcome();

  addUser(text);
  const typingEl = addTyping();

  try {
    const res = await fetch(webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatInput: text, sessionId })
    });

    if (!res.ok) throw new Error(`Server responded ${res.status}`);

    const data = await res.json();
    removeEl(typingEl);

    // Try every common field name n8n might return
    const answer =
      (typeof data === 'string' ? data : null)
      || data.output
      || data.text
      || data.answer
      || data.response
      || data.message
      || (Array.isArray(data) && (data[0]?.output || data[0]?.text || data[0]?.answer))
      || JSON.stringify(data, null, 2);

    addBot(answer);

  } catch (err) {
    removeEl(typingEl);
    addErr(
      `Could not reach the assistant.\n\n` +
      `Error: ${err.message}\n\n` +
      `Check:\n• Your n8n workflow is Active\n` +
      `• The webhook URL is correct\n` +
      `• CORS is enabled on Railway`
    );
  }

  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Render helpers ─────────────────────────────────────────────
function addUser(text) {
  return addRow('user', 'You', text);
}

function addBot(text) {
  return addRow('bot', 'AI', text);
}

function addErr(text) {
  return addRow('bot err', 'AI', text);
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'row bot';
  row.innerHTML = `
    <div class="av">AI</div>
    <div class="bubble">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>`;
  msgsEl.appendChild(row);
  scrollBottom();
  return row;
}

function addRow(role, label, text) {
  const row = document.createElement('div');
  row.className = `row ${role}`;
  row.innerHTML = `
    <div class="av">${label}</div>
    <div class="bubble">${escape(text)}</div>`;
  msgsEl.appendChild(row);
  scrollBottom();
  return row;
}

function escape(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function removeEl(el) { if (el && el.parentNode) el.remove(); }
function scrollBottom() { msgsEl.scrollTop = msgsEl.scrollHeight; }
</script>
</body>
</html>
